# =============================================================================
# GreenTech Intelligence - Docker Compose
# Infrastructure locale complète
# =============================================================================

services:
  # === Base de Données PostgreSQL ===
  postgres:
    image: postgres:15-alpine
    container_name: greentech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: greentech
      POSTGRES_PASSWORD: greentech_dev_password
      POSTGRES_DB: greentech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greentech -d greentech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greentech-network

  # === Stockage Objet MinIO (Compatible S3) ===
  minio:
    image: minio/minio:latest
    container_name: greentech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - greentech-network

  # === Création des Buckets MinIO ===
  minio-init:
    image: minio/mc:latest
    container_name: greentech-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/raw-data --ignore-existing;
      mc mb myminio/clean-data --ignore-existing;
      mc mb myminio/models --ignore-existing;
      mc mb myminio/mlflow --ignore-existing;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - greentech-network

  # === MLflow Tracking Server ===
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: greentech-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://greentech:greentech_dev_password@postgres:5432/greentech_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://greentech:greentech_dev_password@postgres:5432/greentech_db
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
    networks:
      - greentech-network

  # === Prometheus (Métriques) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: greentech-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - greentech-network

  # === Loki (Agrégation Logs) ===
  loki:
    image: grafana/loki:2.9.0
    container_name: greentech-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    # Healthcheck sur l'endpoint /ready : l'API repond 503 pendant la phase
    # d'initialisation (chargement WAL, boot du compactor, application du
    # schema). Sans ce check, `docker compose up -d` marque Loki "running" des
    # que le processus demarre, ce qui provoque un 503 au premier appel du
    # pipeline (30-40 s plus tard, le service est pret). Avec ce healthcheck,
    # `docker compose up -d --wait` attend que Loki soit reellement operationnel.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready | grep -q 'ready' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - greentech-network

  # === Pushgateway (Métriques jobs éphémères) ===
  # Les scripts de re-entrainement et le pipeline poussent leurs métriques ici,
  # Prometheus scrape ensuite cette instance. Indispensable pour les jobs qui
  # ne tournent pas en continu (donc inscrapables directement).
  pushgateway:
    image: prom/pushgateway:latest
    container_name: greentech-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    command:
      - '--web.enable-admin-api'
      - '--persistence.file=/data/pushgateway.data'
      - '--persistence.interval=5m'
    volumes:
      - pushgateway-data:/data
    networks:
      - greentech-network

  # === cAdvisor (Métriques par conteneur) ===
  # Expose des métriques Prometheus sur la consommation CPU/RAM/réseau/disque
  # de chaque conteneur Docker. Permet de surveiller l'empreinte de chaque
  # service du stack depuis Grafana.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: greentech-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - greentech-network

  # === Grafana (Dashboards) ===
  grafana:
    image: grafana/grafana:latest
    container_name: greentech-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - greentech-network

  # === API Backend (FastAPI) ===
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: greentech-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Pydantic Settings calcule database_url depuis ces champs (cf. config.py).
      # DATABASE_URL n'est pas lu : seuls POSTGRES_* comptent.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: greentech_db
      POSTGRES_USER: greentech
      POSTGRES_PASSWORD: greentech_dev_password
      POSTGRES_APP_USER: greentech_app
      POSTGRES_APP_PASSWORD: greentech_app_password
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MLFLOW_TRACKING_URI: http://mlflow:5000
      LOKI_URL: http://loki:3100
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      HUGGINGFACE_MODEL_SUMMARIZER: ${HUGGINGFACE_MODEL_SUMMARIZER:-Qwen/Qwen3-4B-Instruct-2507}
      HUGGINGFACE_MODEL_GREEN_SUMMARIZER: ${HUGGINGFACE_MODEL_GREEN_SUMMARIZER:-Qwen/Qwen3-4B-Instruct-2507}
      HUGGINGFACE_MODEL_CLASSIFIER: ${HUGGINGFACE_MODEL_CLASSIFIER:-microsoft/deberta-v3-base}
      HUGGINGFACE_MODEL_CLASSIFIER_LLM: ${HUGGINGFACE_MODEL_CLASSIFIER_LLM:-Qwen/Qwen3-4B-Instruct-2507}
      HUGGINGFACE_MODEL_LOCAL_FALLBACK: ${HUGGINGFACE_MODEL_LOCAL_FALLBACK:-Qwen/Qwen2.5-3B-Instruct}
      HUGGINGFACE_MODEL_LOCAL_FALLBACK_LIGHTWEIGHT: ${HUGGINGFACE_MODEL_LOCAL_FALLBACK_LIGHTWEIGHT:-Qwen/Qwen2.5-1.5B-Instruct}
      # Origines autorisees par le middleware CORS : on ajoute http://localhost
      # (port 80 implicite) pour que le frontend servi par NGINX puisse dialoguer
      # avec l'API. Les deux premieres origines couvrent les modes de dev (Vite
      # HMR sur 5173, alternatives sur 3000).
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost,http://localhost:80"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      # Cache HuggingFace persistant : evite de re-telecharger les modeles
      # (Llama-3.2-3B base ~6 Go, Qwen2.5-3B fallback ~6 Go) a chaque
      # docker-compose up --force-recreate. Le cache survit aux recreate
      # et aux redemarrages mais peut etre purge manuellement via
      # ``docker volume rm greentech-hf-cache-api``.
      - hf-cache-api:/home/appuser/.cache/huggingface
    # Limites memoire configurables via ``.env`` pour adapter au poste cible :
    #   - Par defaut ``4g`` : suffisant pour le pipeline en mode SaaS HF.
    #   - Poser ``API_MEM_LIMIT=20g`` et ``API_MEMSWAP_LIMIT=24g`` (ou plus)
    #     permet au fallback local Qwen 7B en CPU de tenir. Pour en beneficier
    #     il faut aussi augmenter la RAM allouee a Docker Desktop
    #     (Settings > Resources > Memory) au-dela de la valeur posee ici.
    # Si la RAM reelle disponible reste sous le seuil, llm_local.py detecte
    # le manque au demarrage et bascule automatiquement sur Qwen 1.5B.
    mem_limit: ${API_MEM_LIMIT:-4g}
    memswap_limit: ${API_MEMSWAP_LIMIT:-6g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "greentech-api"
    networks:
      - greentech-network
    profiles:
      - full

  # === Frontend (React - Production NGINX) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greentech-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - greentech-network
    profiles:
      - full

# === Volumes Persistants ===
volumes:
  postgres-data:
    name: greentech-postgres-data
  minio-data:
    name: greentech-minio-data
  pushgateway-data:
    name: greentech-pushgateway-data
  prometheus-data:
    name: greentech-prometheus-data
  grafana-data:
    name: greentech-grafana-data
  loki-data:
    name: greentech-loki-data
  hf-cache-api:
    name: greentech-hf-cache-api

# === Réseau ===
networks:
  greentech-network:
    name: greentech-network
    driver: bridge
