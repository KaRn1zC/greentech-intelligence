# =============================================================================
# GreenTech Intelligence - Docker Compose
# Infrastructure locale complète
# =============================================================================

services:
  # === Base de Données PostgreSQL ===
  postgres:
    image: postgres:15-alpine
    container_name: greentech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: greentech
      POSTGRES_PASSWORD: greentech_dev_password
      POSTGRES_DB: greentech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greentech -d greentech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greentech-network

  # === Stockage Objet MinIO (Compatible S3) ===
  minio:
    image: minio/minio:latest
    container_name: greentech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - greentech-network

  # === Création des Buckets MinIO ===
  minio-init:
    image: minio/mc:latest
    container_name: greentech-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/raw-data --ignore-existing;
      mc mb myminio/clean-data --ignore-existing;
      mc mb myminio/models --ignore-existing;
      mc mb myminio/mlflow --ignore-existing;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - greentech-network

  # === MLflow Tracking Server ===
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: greentech-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://greentech:greentech_dev_password@postgres:5432/greentech_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://greentech:greentech_dev_password@postgres:5432/greentech_db
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
    networks:
      - greentech-network

  # === Prometheus (Métriques) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: greentech-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - greentech-network

  # === Loki (Agrégation Logs) ===
  loki:
    image: grafana/loki:2.9.0
    container_name: greentech-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - greentech-network

  # === Grafana (Dashboards) ===
  grafana:
    image: grafana/grafana:latest
    container_name: greentech-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - greentech-network

  # === API Backend (FastAPI) ===
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: greentech-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://greentech:greentech_dev_password@postgres:5432/greentech_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
    networks:
      - greentech-network
    profiles:
      - full

  # === Frontend (React - Dev Mode) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: greentech-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - greentech-network
    profiles:
      - full

# === Volumes Persistants ===
volumes:
  postgres-data:
    name: greentech-postgres-data
  minio-data:
    name: greentech-minio-data
  prometheus-data:
    name: greentech-prometheus-data
  grafana-data:
    name: greentech-grafana-data
  loki-data:
    name: greentech-loki-data

# === Réseau ===
networks:
  greentech-network:
    name: greentech-network
    driver: bridge
