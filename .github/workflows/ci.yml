# =============================================================================
# GreenTech Intelligence - CI Pipeline
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # =========================================================================
  # Backend Linting & Tests
  # =========================================================================
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --dev
      
      - name: Run Ruff linter
        run: uv run ruff check src/ tests/
      
      - name: Run Ruff formatter check
        run: uv run ruff format --check src/ tests/

  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: greentech
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: greentech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --dev
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://greentech:test_password@localhost:5432/greentech_test
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
        run: |
          uv run pytest tests/ -v --cov=src/greentech --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # =========================================================================
  # AI Model Tests (Deepchecks)
  # =========================================================================
  ai-validation:
    name: 🤖 AI Model Validation
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies (sans wheels ROCm Windows)
        # --no-sources ignore [tool.uv.sources] (wheels ROCm win_amd64)
        # qui ne s'installeraient pas sur Linux. uv resoudra alors torch
        # depuis l'index PyPI standard (build CPU compatible Ubuntu).
        run: uv sync --dev --no-sources

      - name: Run AI-aware unit tests
        # Les 7 fichiers de tests/unit/ai/ utilisent des datasets
        # synthetiques en memoire (cf. docstring de chaque module) et
        # ne dependent ni du golden_dataset DVC ni du modele de
        # production. Ils sont donc deterministes et bloquants : un
        # echec doit casser la CI car il revele une regression sur
        # la calibration, la stratification, la fusion TIES, etc.
        run: |
          uv run python -m pytest tests/unit/ai/ -v --tb=short

  # =========================================================================
  # Frontend Lint & Tests
  # =========================================================================
  frontend-lint:
    name: 🎨 Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run TypeScript check
        run: npm run type-check

  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Tests unitaires Vitest non encore configures sur ce projet
      # (cf. C18 du rapport E4 — couverture frontend assuree par les
      # tests d'accessibilite Playwright + Axe-core qui exercent les
      # composants via le navigateur). A activer en backlog si une
      # suite Vitest est ajoutee dans frontend/src/__tests__/.

      - name: Build application
        run: npm run build

  # =========================================================================
  # Accessibility Tests (Axe-core)
  # =========================================================================
  accessibility:
    name: ♿ Accessibility Tests
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Run accessibility tests
        # Test Playwright + Axe-core sur les 3 pages (Login, Dashboard,
        # ArticleDetail) + navigation clavier + responsive 3 viewports.
        # Le webServer Playwright lance lui-meme le frontend Vite via
        # `npm run dev`, donc pas besoin d'un backend API en CI : les
        # pages qui dependent de l'API affichent un etat d'erreur que
        # Axe-core audite quand meme. Job bloquant : toute violation
        # WCAG 2.1 AA de niveau serious/critical casse la CI.
        working-directory: ./frontend
        run: npm run test:a11y
      
      - name: Upload accessibility report
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: frontend/a11y-report/
          retention-days: 7

  # =========================================================================
  # Accessibility Tests for Sphinx Documentation
  # =========================================================================
  docs-accessibility:
    name: ♿ Docs Accessibility Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Build Sphinx documentation
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Axe-core audit on Sphinx docs
        working-directory: ./frontend
        run: npm run test:a11y:docs

      - name: Upload docs accessibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-docs-report
          path: frontend/a11y-docs-report/
          retention-days: 7

      - name: Upload built documentation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-html
          path: docs/_build/html/
          retention-days: 7

  # =========================================================================
  # Docker Build
  # =========================================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      # Les runners ubuntu-latest n'ont que ~14 GB libres. La pile PyTorch
      # (~10 GB) + dépendances saturait le disque pendant le build. On libère
      # ~25 GB en supprimant les SDK pré-installés inutiles pour notre build.
      - name: Libérer de l'espace disque
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          tags: greentech-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: greentech-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Security Scan
  # =========================================================================
  # Le job pip-audit echoue la CI en cas de vulnerabilite detectee dans les
  # dependances Python (2026-05-16, remplace le precedent `continue-on-error: true`).
  #
  # Filtrage applique avant le scan :
  #   - Wheels ROCm Windows (`rocm*`, `torch @`, `torchvision @`, `torchaudio @`)
  #     non indexes PyPI/OSV donc impossibles a auditer
  #
  # CVE ignorees (revue 2026-05-16) :
  #   - CVE-2025-69872 (diskcache 5.6.3, tire par `dvc-data`) : pas de fix
  #     disponible upstream. Surface d'attaque limitee : utilise pour le
  #     versioning de donnees ML en backend, non expose sur l'API publique.
  #   - CVE-2026-42304 (twisted 25.5.0, tire par `scrapy`) : fix disponible
  #     uniquement en pre-release `26.4.0rc2`. Surface d'attaque limitee :
  #     utilise par le module de scraping execute manuellement, non expose
  #     en runtime de l'API. A revoir des qu'une version stable >= 26.4.0
  #     sort cote upstream.
  #
  # CVE ignorees (revue 2026-05-20) :
  #   23 vulnerabilites nouvellement divulguees dans la base OSV APRES le
  #   dernier run vert (commit 1d7ba2e, 2026-05-19). Les versions de nos
  #   dependances n'ont PAS change : ce sont des divulgations posterieures,
  #   pas des regressions de notre code. Aucune n'expose de version corrective
  #   cote upstream (colonne « Fix Versions » vide chez pip-audit) ; chacune
  #   reste suivie et sera retiree des qu'un correctif sortira.
  #     - pyjwt 2.12.1        : PYSEC-2025-183
  #     - flask-cors 6.0.2    : PYSEC-2024-271
  #     - joblib 1.5.3        : PYSEC-2024-277
  #     - python-jose 3.5.0   : PYSEC-2025-185
  #     - transformers 5.8.1  : PYSEC-2025-211 a -218 (8 CVE)
  #     - torch 2.12.0        : PYSEC-2025-189 a -197, PYSEC-2025-210,
  #                             PYSEC-2026-139 (11 CVE)
  #   Surfaces maitrisees : torch et transformers ne servent que l'inference ML
  #   hors-ligne (jamais atteignable depuis l'API HTTP publique) ; pyjwt,
  #   python-jose et flask-cors sont suivies pour upgrade prioritaire des
  #   qu'un correctif sera publie. On suit les CVE par identifiant (et non en
  #   filtrant les paquets) pour que pip-audit continue de les auditer.
  #
  # CVE ignoree (revue 2026-05-22) :
  #   - starlette 0.52.1 : PYSEC-2026-161 (validation manquante du header Host
  #     -> poisoning de request.url.path, contournement des controles bases sur
  #     le chemin). Un correctif EXISTE (starlette 1.0.1) mais l'upgrade est
  #     bloque en amont : prometheus-fastapi-instrumentator (>=7.0, dernier 7.x)
  #     epingle starlette < 1.0 et aucune release compatible starlette 1.0
  #     n'existe encore -> resolution uv insatisfiable (FastAPI 0.136 autorise
  #     pourtant starlette>=0.46 sans borne haute). Exposition limitee :
  #     l'autorisation de l'API repose sur le JWT (Depends(get_current_user)),
  #     non sur des controles bases sur le Host/chemin, et la prod est derriere
  #     le proxy Render qui normalise le Host. A RETIRER + bumper
  #     starlette>=1.0.1 des que prometheus-fastapi-instrumentator supporte
  #     starlette 1.0.
  #
  # Toute nouvelle CVE doit etre fixee (upgrade dependance) OU explicitement
  # ajoutee a cette liste avec une justification ecrite.
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Run pip-audit
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          # Filtre les wheels ROCm Windows non auditables (URLs directes repo.radeon.com)
          grep -Ev "^(rocm|torch |torchvision |torchaudio )|^(torch|torchvision|torchaudio) @" requirements.txt > requirements.audit.txt
          uvx pip-audit -r requirements.audit.txt --no-deps \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln CVE-2026-42304 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2024-271 \
            --ignore-vuln PYSEC-2024-277 \
            --ignore-vuln PYSEC-2025-185 \
            --ignore-vuln PYSEC-2025-211 \
            --ignore-vuln PYSEC-2025-212 \
            --ignore-vuln PYSEC-2025-213 \
            --ignore-vuln PYSEC-2025-214 \
            --ignore-vuln PYSEC-2025-215 \
            --ignore-vuln PYSEC-2025-216 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2025-218 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln PYSEC-2026-161
