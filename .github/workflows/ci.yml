# =============================================================================
# GreenTech Intelligence - CI Pipeline
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # =========================================================================
  # Backend Linting & Tests
  # =========================================================================
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --dev
      
      - name: Run Ruff linter
        run: uv run ruff check src/ tests/
      
      - name: Run Ruff formatter check
        run: uv run ruff format --check src/ tests/

  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: greentech
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: greentech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --dev
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://greentech:test_password@localhost:5432/greentech_test
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
        run: |
          uv run pytest tests/ -v --cov=src/greentech --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # =========================================================================
  # AI Model Tests (Deepchecks)
  # =========================================================================
  ai-validation:
    name: 🤖 AI Model Validation
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies (CPU)
        run: uv sync --extra cpu --dev
      
      - name: Run Deepchecks validation
        run: |
          uv run python -m pytest tests/ai/ -v --tb=short
        continue-on-error: true

  # =========================================================================
  # Frontend Lint & Tests
  # =========================================================================
  frontend-lint:
    name: 🎨 Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run TypeScript check
        run: npm run type-check

  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test -- --coverage
      
      - name: Build application
        run: npm run build

  # =========================================================================
  # Accessibility Tests (Axe-core)
  # =========================================================================
  accessibility:
    name: ♿ Accessibility Tests
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Run accessibility tests
        working-directory: ./frontend
        run: npm run test:a11y
        continue-on-error: true
      
      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: frontend/a11y-report/
          retention-days: 7

  # =========================================================================
  # Accessibility Tests for Sphinx Documentation
  # =========================================================================
  docs-accessibility:
    name: ♿ Docs Accessibility Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Build Sphinx documentation
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Axe-core audit on Sphinx docs
        working-directory: ./frontend
        run: npm run test:a11y:docs

      - name: Upload docs accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-docs-report
          path: frontend/a11y-docs-report/
          retention-days: 7

      - name: Upload built documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-html
          path: docs/_build/html/
          retention-days: 7

  # =========================================================================
  # Docker Build
  # =========================================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          tags: greentech-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: greentech-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Security Scan
  # =========================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: backend-lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Run pip-audit
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          uvx pip-audit -r requirements.txt
        continue-on-error: true
