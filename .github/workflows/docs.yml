# =============================================================================
# GreenTech Intelligence - Documentation Sphinx -> GitHub Pages
# =============================================================================
# Build de la documentation Sphinx (corps + reference de code via
# sphinx-autoapi) et publication sur GitHub Pages via l'action officielle.
#
# Pre-requis (a faire une seule fois cote GitHub) :
#   Settings > Pages > Source : "GitHub Actions"
#
# URL resultante :
#   https://karn1zc.github.io/greentech-intelligence/
# =============================================================================

name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/greentech/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Permissions minimales pour deployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule execution simultanee ; les pushes rapides annulent les builds
# en cours pour ne deployer que la derniere version.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: 📚 Build Sphinx + autoapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --no-sources

      - name: Build Sphinx documentation
        run: uv run sphinx-build -b html docs docs/_build/html -W --keep-going
        # -W : transforme les warnings en erreurs (build qualite)
        # --keep-going : ne s'arrete pas au premier, accumule tous les warnings

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
