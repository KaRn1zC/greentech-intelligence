server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour reduire la bande passante
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache des assets statiques (hash dans le nom de fichier)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html : ne JAMAIS mettre en cache cote navigateur. Le hash des
    # assets change a chaque build mais c'est index.html qui pointe vers
    # le bon hash. Si le navigateur garde un index.html peri me, il
    # continuera de charger l'ancien bundle JS apres un re-deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # SPA fallback : toutes les routes redirigent vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers l'API backend (si utilise dans le meme reseau Docker)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Headers de securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
