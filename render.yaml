# =============================================================================
# GreenTech Intelligence - Render Blueprint (MVP lecture seule)
# =============================================================================
# Deploy : lier le depot GitHub a Render -> le blueprint detecte
# automatiquement les services a deployer.
# Scope MVP : API REST en lecture (GET /articles, /stats, /auth, /health)
# + Frontend static. L'endpoint /analyze est present mais retourne 503 si
# Redis est indisponible (cas Render free sans broker dedie).
#
# Docs : https://docs.render.com/blueprint-spec
# =============================================================================

services:
  # === API Backend (FastAPI) ===
  - type: web
    name: greentech-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    region: frankfurt
    # autoDeploy: false → le deploiement n'est PAS declenche par les pushes
    # sur main (Render ne rebuild plus Docker a chaque commit). Le CD est
    # pilote exclusivement par .github/workflows/cd.yml qui appelle
    # johnbeynon/render-deploy-action quand la CI est verte, ce qui garantit
    # le gating GitHub Actions et evite les rebuilds inutiles.
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      # PostgreSQL : Render injecte une connection string complete
      # qui surcharge automatiquement les variables postgres_* via
      # le champ database_url_override (alias DATABASE_URL).
      - key: DATABASE_URL
        fromDatabase:
          name: greentech-db
          property: connectionString
      # Secret signature JWT + session : generes une fois par Render,
      # constants ensuite (sync: false permet de les modifier sans
      # redeclencher tout le blueprint).
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "30"
      # Environnement applicatif : declenche create_all() au demarrage
      # pour que la base soit operationnelle des le premier deploiement.
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      # CORS : autoriser uniquement le frontend Render (pas de wildcard
      # en production conformement au principe du moindre privilege OWASP).
      - key: CORS_ORIGINS
        value: https://greentech-frontend.onrender.com
      # Hugging Face : optionnel pour le MVP lecture seule (l'endpoint
      # /analyze qui necessite HF Serverless retournera 503 sur Render).
      # Permet d'ajouter une cle apres deploiement sans re-pousser le code.
      - key: HUGGINGFACE_TOKEN
        sync: false

  # === Frontend (Site Static React + Vite) ===
  # Les sites statiques Render utilisent le CDN global (champ `region`
  # non accepte) et sont gratuits par defaut (champ `plan` non accepte
  # non plus). Cf https://render.com/docs/blueprint-spec#site
  - type: web
    name: greentech-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npx vite build
    staticPublishPath: frontend/dist
    # Idem API : deploiement pilote par le CD GitHub Actions.
    autoDeploy: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://greentech-api.onrender.com

# === Base de Donnees PostgreSQL ===
databases:
  - name: greentech-db
    plan: free
    region: frankfurt
    databaseName: greentech_db
    user: greentech
