# =============================================================================
# GreenTech Intelligence - Render Blueprint
# =============================================================================
# Deploy : Lier ce depot GitHub a Render, le blueprint detecte automatiquement
#          les services a deployer.
# Docs   : https://docs.render.com/blueprint-spec
# =============================================================================

services:
  # === API Backend (FastAPI) ===
  - type: web
    name: greentech-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: greentech-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "30"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://greentech-frontend.onrender.com

  # === Frontend (React Static Site) ===
  - type: web
    name: greentech-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npx vite build
    staticPublishPath: frontend/dist
    plan: free
    region: frankfurt
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://greentech-api.onrender.com

# === Base de Donnees PostgreSQL ===
databases:
  - name: greentech-db
    plan: free
    region: frankfurt
    databaseName: greentech_db
    user: greentech
